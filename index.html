<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTrack - 求职进度跟踪工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>JobTrack</h1>
            <p>轻松追踪您的求职进度</p>
        </header>

        <nav class="view-toggle">
            <button id="listViewBtn" class="active">列表</button>
            <button id="ganttViewBtn">甘特图</button>
        </nav>

        <main>
            <!-- Action buttons -->
            <div class="actions">
                <button id="addRecordBtn" class="btn-primary">+ 添加记录</button>
                <button id="exportBtn" class="btn-secondary">导出数据</button>
            </div>

            <!-- Filters -->
            <div id="filters" class="filters">
                <input type="text" id="companyFilter" placeholder="按公司筛选...">
                <select id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="已投递">已投递</option>
                    <option value="初面">初面</option>
                    <option value="二面">二面</option>
                    <option value="终面">终面</option>
                    <option value="Offer">Offer</option>
                    <option value="拒信">拒信</option>
                </select>
                <input type="date" id="startDateFilter" placeholder="开始日期">
                <input type="date" id="endDateFilter" placeholder="结束日期">
                <button id="clearFiltersBtn">清除筛选</button>
            </div>

            <!-- List View -->
            <div id="listView" class="view active">
                <table id="jobTable">
                    <thead>
                        <tr>
                            <th>公司名称</th>
                            <th>职位</th>
                            <th>投递时间</th>
                            <th>最新状态</th>
                            <th>状态更新时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="jobTableBody">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
                
                <div id="emptyState" class="empty-state">
                    <p>开始记录你的求职旅程吧！</p>
                    <button id="addRecordEmptyBtn" class="btn-primary">添加第一条记录</button>
                </div>
            </div>

            <!-- Gantt View -->
            <div id="ganttView" class="view">
                <div id="ganttChart">
                    <!-- Gantt chart will be rendered here -->
                </div>
            </div>
        </main>

        <!-- Modal for adding/editing records -->
        <div id="recordModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">添加求职记录</h2>
                <form id="recordForm">
                    <div class="form-group">
                        <label for="companyName">公司名称 *</label>
                        <input type="text" id="companyName" required>
                    </div>
                    <div class="form-group">
                        <label for="position">职位</label>
                        <input type="text" id="position">
                    </div>
                    <div class="form-group">
                        <label for="applicationDate">投递时间 *</label>
                        <input type="date" id="applicationDate" required>
                    </div>
                    <div class="form-group">
                        <label for="status">状态 *</label>
                        <select id="status" required>
                            <option value="已投递">已投递</option>
                            <option value="初面">初面</option>
                            <option value="二面">二面</option>
                            <option value="终面">终面</option>
                            <option value="Offer">Offer</option>
                            <option value="拒信">拒信</option>
                            <option value="other">其他</option>
                        </select>
                        <input type="text" id="customStatus" placeholder="请输入自定义状态" style="display:none;">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">保存</button>
                        <button type="button" id="cancelModalBtn" class="btn-secondary">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal for status update -->
        <div id="statusModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>更新状态</h2>
                <form id="statusForm">
                    <input type="hidden" id="editRecordId">
                    <div class="form-group">
                        <label for="updateStatus">新状态</label>
                        <select id="updateStatus">
                            <option value="已投递">已投递</option>
                            <option value="初面">初面</option>
                            <option value="二面">二面</option>
                            <option value="终面">终面</option>
                            <option value="Offer">Offer</option>
                            <option value="拒信">拒信</option>
                            <option value="other">其他</option>
                        </select>
                        <input type="text" id="customUpdateStatus" placeholder="请输入自定义状态" style="display:none;">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">确认更新</button>
                        <button type="button" id="cancelStatusModalBtn" class="btn-secondary">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Modal for record details -->
        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>记录详情</h2>
                <div id="recordDetails"></div>
                <div class="form-actions">
                    <button id="deleteRecordBtn" class="btn-danger">删除记录</button>
                    <button type="button" id="closeDetailModalBtn" class="btn-secondary">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
